<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años María José</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="envlope-wrapper">
        <div id="envelope" class="close">
            <div class="front flap"></div>
            <div class="front pocket"></div>
            <div class="letter">
                <div class="words line1">¡Estás Invitado!</div>
                <div class="words line2">MIS XV AÑOS</div>
                <div class="words line3">15 de Mayo, 2026</div>
                <div class="words line4">
    <a href="https://maps.app.goo.gl/Niq5JR3815vtuUHC8" target="_blank">Ver ubicación en Google Maps</a>
</div>
            </div>
            <div class="hearts">
                <div class="heart a1"></div>
                <div class="heart a2"></div>
                <div class="heart a3"></div>
            </div>
        </div>
    </div>
    <div class="reset">
        <button id="open">Abrir Sobre</button>
        <button id="reset">Cerrar</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
